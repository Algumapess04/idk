<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flores em Bloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Libre+Baskerville:ital@1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:    #c97a8a;
      --blush:   #a05068;
      --cream:   #0d0810;
      --lavender:#8a5aaf;
      --sage:    #4a7a5a;
      --gold:    #c4922a;
      --ink:     #f0e8f5;
    }

    body {
      background: var(--cream);
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CANVAS DE FLORES ── */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
    }

    /* ── HERO MESSAGE ── */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      opacity: 0;
      transform: translateY(22px);
      animation: fadeUp 1.6s cubic-bezier(.22,1,.36,1) 1.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: clamp(.75rem, 1.5vw, .9rem);
      color: var(--gold);
      letter-spacing: .22em;
      text-transform: uppercase;
      opacity: .85;
    }

    .headline {
      font-size: clamp(2.4rem, 7vw, 5.2rem);
      font-weight: 300;
      color: var(--ink);
      line-height: 1.1;
      letter-spacing: -.01em;
    }

    .headline em {
      font-style: italic;
      color: #e08898;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
    }

    .sub {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: #b8a0c0;
      font-weight: 300;
      font-style: italic;
      max-width: 34ch;
      line-height: 1.7;
    }

    /* pulsing ring */
    .ring {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      border: 1px solid rgba(232,160,160,.25);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    .ring:nth-child(2) { width: 480px; height: 480px; animation-delay: 1s; border-color: rgba(197,168,212,.18); }
    .ring:nth-child(3) { width: 620px; height: 620px; animation-delay: 2s; border-color: rgba(155,189,155,.12); }

    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.04); opacity: .5; }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>

  <div class="hero">
    <span class="eyebrow">Todo dia você sempre encontra uma maneira de ser mais a apaixonante possível!!</span>
    <h1 class="headline">Eu Amo <em>Muito</em>Você,<br>minha linda <3 </h1>
    <div class="divider"></div>
    <p class="sub">Da mesma forma que cada pétala pode carregar um universo, os seus olhos carregam minha galáxia e com certeza essa é a mais linda de todas.</p>
  </div>

<script>
/* ── FLORES EM CANVAS ── */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* pallette */
const PALETTES = [
  ['#c97a8a','#a05068','#7a2a48'],  // deep rose
  ['#8a5aaf','#6a3a8f','#4a1a6f'],  // deep lavender
  ['#4a7a5a','#2a5a3a','#1a3a2a'],  // deep sage
  ['#c4922a','#a47010','#7a5000'],  // deep gold
  ['#4a6a9a','#2a4a7a','#1a2a5a'],  // deep indigo
];

function randPalette() { return PALETTES[Math.floor(Math.random()*PALETTES.length)]; }

/* single flower */
class Flower {
  constructor() { this.reset(true); }

  reset(init) {
    this.x       = Math.random() * W;
    this.y       = init ? Math.random() * H : H + 60;
    this.size    = 18 + Math.random() * 38;
    this.petals  = 5 + Math.floor(Math.random() * 4);
    this.angle   = Math.random() * Math.PI * 2;
    this.spin    = (Math.random() - .5) * .008;
    this.vy      = -(0.25 + Math.random() * 0.55);
    this.vx      = (Math.random() - .5) * 0.35;
    this.alpha   = 0;
    this.fadeIn  = .008 + Math.random() * .008;
    this.life    = 0;
    this.maxLife = 600 + Math.random() * 400;
    this.palette = randPalette();
    this.sway    = Math.random() * Math.PI * 2;
    this.swaySpd = .012 + Math.random() * .012;
    this.swayAmp = .3 + Math.random() * .5;
  }

  drawPetal(ctx, r, color, shadow) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, -r*.55, r*.32, r*.6, 0, 0, Math.PI*2);
    ctx.fillStyle = shadow;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, -r*.6, r*.26, r*.52, 0, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    const r  = this.size;
    const [c0, c1, c2] = this.palette;

    /* petals */
    for (let i = 0; i < this.petals; i++) {
      ctx.save();
      ctx.rotate((Math.PI * 2 / this.petals) * i);
      this.drawPetal(ctx, r, c0, c1);
      ctx.restore();
    }

    /* inner layer */
    for (let i = 0; i < this.petals; i++) {
      ctx.save();
      ctx.rotate((Math.PI * 2 / this.petals) * i + Math.PI / this.petals);
      ctx.scale(.65, .65);
      this.drawPetal(ctx, r, c1, c2);
      ctx.restore();
    }

    /* center */
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * .28);
    grad.addColorStop(0, '#fff0c0');
    grad.addColorStop(1, '#c4922a44');
    ctx.beginPath();
    ctx.arc(0, 0, r * .28, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.restore();
  }

  update() {
    this.life++;
    this.sway += this.swaySpd;
    this.x   += this.vx + Math.sin(this.sway) * this.swayAmp;
    this.y   += this.vy;
    this.angle += this.spin;

    const fadeOut = this.maxLife - 120;
    if (this.life < 80)      this.alpha = Math.min(1, this.alpha + this.fadeIn);
    else if (this.life > fadeOut) this.alpha = Math.max(0, 1 - (this.life - fadeOut) / 120);

    return this.life < this.maxLife && this.y > -this.size * 2;
  }
}

/* falling petal */
class Petal {
  constructor() { this.reset(true); }
  reset(init) {
    this.x     = Math.random() * W;
    this.y     = init ? Math.random() * H : -20;
    this.size  = 4 + Math.random() * 10;
    this.angle = Math.random() * Math.PI * 2;
    this.spin  = (Math.random() - .5) * .06;
    this.vy    = .6 + Math.random() * 1.2;
    this.vx    = (Math.random() - .5) * .8;
    this.alpha = .6 + Math.random() * .4;
    this.color = PALETTES[Math.floor(Math.random()*PALETTES.length)][0];
    this.sway  = Math.random() * Math.PI * 2;
    this.swayA = .4 + Math.random() * .6;
    this.swayS = .025 + Math.random() * .025;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha * .65;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size * .5, this.size, 0, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
  update() {
    this.sway += this.swayS;
    this.x    += this.vx + Math.sin(this.sway) * this.swayA;
    this.y    += this.vy;
    this.angle += this.spin;
    if (this.y > H + 20) this.reset(false);
  }
}

/* pool */
const FLOWER_COUNT = 18;
const PETAL_COUNT  = 60;
const flowers = Array.from({length: FLOWER_COUNT}, () => new Flower());
const petals  = Array.from({length: PETAL_COUNT},  () => new Petal());

let last = 0;
function loop(ts) {
  requestAnimationFrame(loop);

  /* slow motion blur trail */
  ctx.fillStyle = 'rgba(13,8,16,0.18)';
  ctx.fillRect(0, 0, W, H);

  /* petals behind */
  petals.forEach(p => { p.update(); p.draw(ctx); });

  /* flowers */
  for (let i = flowers.length - 1; i >= 0; i--) {
    if (!flowers[i].update()) {
      flowers[i] = new Flower();
    } else {
      flowers[i].draw(ctx);
    }
  }

  /* spawn extras over time */
  if (ts - last > 3200 && flowers.length < 28) {
    flowers.push(new Flower());
    last = ts;
  }
}

/* initial clear */
ctx.fillStyle = '#0d0810';
ctx.fillRect(0,0,W,H);
requestAnimationFrame(loop);
</script>
</body>
</html>
